name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Download LÖVE
      run: |
        curl -L -o love.zip https://github.com/love2d/love/releases/download/11.4/love-11.4-win64.zip
        unzip love.zip

    - name: Create Game Directory
      run: |
        mkdir -p game
        cp -r *.lua game/
        cp -r function game/
        cp -r objact game/
        cp -r room game/
        cp -r asset game/
        cp -r chart game/
        cp -r temporary game/
        cp -r auto_save game/
        cp -r ui game/
        cp -r export game/

    - name: Package Game
      run: |
        zip -r game.zip game/
        cat love-11.4-win64/love.exe game.zip > dakumi_editor.exe
        zip -r dakumi_editor_windows.zip dakumi_editor.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dakumi_editor_windows
        path: dakumi_editor_windows.zip 